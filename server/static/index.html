<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/garden-camera/">
    <title>Gartenkamera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; }
        header { background: #16213e; padding: 1rem 2rem; border-bottom: 2px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.4rem; font-weight: 600; }
        #count { font-size: 0.9rem; color: #888; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; padding: 1.5rem; }
        .card { background: #16213e; border-radius: 8px; overflow: hidden; border: 1px solid #0f3460; transition: transform 0.15s; position: relative; }
        .heron-badge { position: absolute; top: 8px; right: 8px; background: #e74c3c; color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; z-index: 1; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; cursor: pointer; }
        .card .info { padding: 0.6rem 0.8rem; font-size: 0.85rem; color: #aaa; display: flex; justify-content: space-between; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; z-index: 100; flex-direction: column; }
        #overlay.active { display: flex; }
        #overlay-header { background: #16213e; padding: 1rem 2rem; border-bottom: 2px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
        #overlay-header h1 { font-size: 1.4rem; font-weight: 600; }
        #overlay-timestamp { font-size: 0.9rem; color: #aaa; }
        #back-btn { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
        #back-btn:hover { background: rgba(255,255,255,0.3); }
        #overlay-body { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #overlay img { max-width: 95%; max-height: 95%; object-fit: contain; cursor: pointer; }
        .empty { text-align: center; padding: 4rem; color: #666; font-size: 1.1rem; grid-column: 1 / -1; }
        #hour-links { padding: 0 1.5rem 2rem; }
        #hour-links h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.8rem; color: #ccc; }
        .hour-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .hour-list a { background: #16213e; border: 1px solid #0f3460; border-radius: 6px; padding: 0.5rem 1rem; color: #aaa; text-decoration: none; font-size: 0.85rem; }
        .hour-list a:hover { background: #0f3460; color: #e0e0e0; }
        .hour-list a .hour-count { color: #666; margin-left: 0.4rem; }
        .heron-link { background: #e74c3c; color: #fff; border: none; border-radius: 6px; padding: 0.5rem 1rem; font-size: 0.9rem; cursor: pointer; text-decoration: none; font-weight: 600; }
        .heron-link:hover { background: #c0392b; }
    </style>
</head>
<body>
    <header>
        <h1>Gartenkamera</h1>
        <div style="display: flex; gap: 1.5rem; align-items: center;">
            <a id="heron-link" class="heron-link" href="fischreiher.html" style="display:none;">Fischreiher-Sichtungen</a>
            <span id="battery"></span>
            <span id="count"></span>
        </div>
    </header>
    <div id="gallery"></div>
    <div id="hour-links"></div>
    <div id="overlay">
        <div id="overlay-header">
            <h1>Gartenkamera</h1>
            <span id="overlay-timestamp"></span>
            <button id="back-btn" onclick="document.getElementById('overlay').classList.remove('active')">Zurück &#8594;</button>
        </div>
        <div id="overlay-body">
            <img id="overlay-img" src="" alt="" onclick="document.getElementById('overlay').classList.remove('active')">
        </div>
    </div>
    <script>
        const gallery = document.getElementById('gallery');
        const overlay = document.getElementById('overlay');
        const overlayImg = document.getElementById('overlay-img');
        const countEl = document.getElementById('count');

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function formatTimestamp(filename) {
            const match = filename.match(/(\d{4})-(\d{2})-(\d{2})_(\d{2})-(\d{2})-(\d{2})/);
            if (!match) return filename;
            return match[3] + '.' + match[2] + '.' + match[1] + ' ' + match[4] + ':' + match[5] + ':' + match[6];
        }

        function imageUrl(filename) {
            return 'images/' + encodeURIComponent(filename);
        }

        function openFullscreen(filename) {
            overlayImg.src = imageUrl(filename);
            document.getElementById('overlay-timestamp').textContent = formatTimestamp(filename);
            overlay.classList.add('active');
        }

        function createCard(img) {
            const card = document.createElement('div');
            card.className = 'card';

            if (img.heron_detected) {
                const badge = document.createElement('span');
                badge.className = 'heron-badge';
                badge.textContent = 'Fischreiher';
                card.appendChild(badge);
            }

            const imgEl = document.createElement('img');
            imgEl.src = imageUrl(img.filename);
            imgEl.alt = img.filename;
            imgEl.loading = 'lazy';
            imgEl.addEventListener('click', () => openFullscreen(img.filename));
            card.appendChild(imgEl);

            const info = document.createElement('div');
            info.className = 'info';

            const ts = document.createElement('span');
            ts.textContent = formatTimestamp(img.filename);
            info.appendChild(ts);

            const size = document.createElement('span');
            size.textContent = formatSize(img.size);
            info.appendChild(size);

            card.appendChild(info);
            return card;
        }

        let knownFiles = new Set();
        const hourLinksEl = document.getElementById('hour-links');

        function formatHourLabel(hourKey) {
            // "2026-04-03_14" -> "03.04.2026 14:00 - 15:00"
            const match = hourKey.match(/(\d{4})-(\d{2})-(\d{2})_(\d{2})/);
            if (!match) return hourKey;
            const h = parseInt(match[4]);
            return match[3] + '.' + match[2] + '.' + match[1] + ' ' + match[4] + ':00 - ' + String(h + 1).padStart(2, '0') + ':00';
        }

        async function loadImages() {
            try {
                const resp = await fetch('images?limit=60');
                const images = await resp.json();
                countEl.textContent = images.length + ' Bilder (neueste 60)';

                const newFiles = new Set(images.map(img => img.filename));

                if (knownFiles.size === 0 || newFiles.size !== knownFiles.size || [...newFiles].some(f => !knownFiles.has(f))) {
                    gallery.replaceChildren();
                    if (images.length === 0) {
                        const empty = document.createElement('div');
                        empty.className = 'empty';
                        empty.textContent = 'Noch keine Bilder vorhanden';
                        gallery.appendChild(empty);
                    } else {
                        for (const img of images) {
                            gallery.appendChild(createCard(img));
                        }
                    }
                    knownFiles = newFiles;
                }
            } catch (e) {
                gallery.replaceChildren();
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = 'Fehler beim Laden der Bilder';
                gallery.appendChild(empty);
                knownFiles = new Set();
            }
        }

        async function loadHours() {
            try {
                const resp = await fetch('hours');
                const hours = await resp.json();
                hourLinksEl.replaceChildren();
                if (hours.length === 0) return;

                const heading = document.createElement('h2');
                heading.textContent = 'Alle Stunden';
                hourLinksEl.appendChild(heading);

                const list = document.createElement('div');
                list.className = 'hour-list';
                for (const h of hours) {
                    const a = document.createElement('a');
                    a.href = 'stunde.html?hour=' + encodeURIComponent(h.hour);
                    a.innerHTML = formatHourLabel(h.hour) + '<span class="hour-count">(' + h.count + ')</span>';
                    list.appendChild(a);
                }
                hourLinksEl.appendChild(list);
            } catch (e) {}
        }

        async function checkDetections() {
            try {
                const resp = await fetch('detections');
                const detections = await resp.json();
                const link = document.getElementById('heron-link');
                if (detections.length > 0) {
                    link.style.display = '';
                    link.textContent = 'Fischreiher-Sichtungen (' + detections.length + ')';
                }
            } catch (e) {}
        }

        const batteryEl = document.getElementById('battery');

        async function loadStatus() {
            try {
                const resp = await fetch('status');
                const data = await resp.json();
                if (data.battery_voltage !== null) {
                    batteryEl.textContent = data.battery_voltage.toFixed(2) + 'V';
                }
            } catch (e) {}
        }

        loadImages();
        loadHours();
        checkDetections();
        loadStatus();
        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
